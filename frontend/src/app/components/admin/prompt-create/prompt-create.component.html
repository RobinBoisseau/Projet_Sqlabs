<div class="max-w-3xl mx-auto py-10 px-6">

  <div class="flex items-center justify-between mb-8">
    <div>
      <a routerLink="/admin/prompts" class="text-sm text-primary hover:underline">← Gestion des prompts</a>
      <h1 class="text-2xl font-bold text-gray-900 mt-1">{{ isEdit ? 'Modifier le prompt' : 'Nouveau Prompt' }}</h1>
    </div>
    <button class="btn btn-primary" (click)="save()" [disabled]="isSaving">
      <span *ngIf="isSaving" class="loading loading-spinner loading-xs"></span>
      {{ isSaving ? 'Enregistrement…' : 'Enregistrer le prompt' }}
    </button>
  </div>

  <div *ngIf="error" class="alert alert-error mb-6 text-sm">
    <span>{{ error }}</span>
  </div>


  <div class="bg-white border border-base-200 rounded-xl shadow-sm p-8 flex flex-col gap-6">

    <!-- Nom -->
    <div class="flex items-start gap-6">
      <label class="w-40 text-sm font-medium text-gray-700 pt-2 shrink-0">Nom du prompt</label>
      <input type="text" class="input input-bordered flex-1" [(ngModel)]="form.nom" placeholder="Ex : MCD few-shot avancé" />
    </div>

    <!-- Type -->
    <div class="flex items-start gap-6">
      <label class="w-40 text-sm font-medium text-gray-700 pt-2 shrink-0">Type</label>
      <select class="select select-bordered flex-1" [(ngModel)]="form.categorie">
        <option value="mcd">MCD</option>
        <option value="dd">Dictionnaire de données</option>
        <option value="df">Dépendances fonctionnelles</option>
      </select>
    </div>

    <!-- Prompt -->
    <div class="flex items-start gap-6">
      <label class="w-40 text-sm font-medium text-gray-700 pt-2 shrink-0">Prompt</label>
      <div class="flex-1">
        <div #quillEditor class="quill-container"></div>
      </div>
    </div>

    <!-- Activitée -->
    <div class="flex items-start gap-6">
      <label class="w-40 text-sm font-medium text-gray-700 pt-2 shrink-0">Activitée</label>
      <select class="select select-bordered flex-1" [(ngModel)]="form.actif">
        <option [ngValue]="true">Actif</option>
        <option [ngValue]="false">Inactif</option>
      </select>
    </div>

  </div>
</div>

<!-- Modal forced_actif -->
<div *ngIf="warningMessage" class="modal modal-open">
  <div class="modal-box">
    <h3 class="font-bold text-lg text-warning">Attention</h3>
    <p class="py-4 text-sm">{{ warningMessage }}</p>
    <div class="modal-action">
      <button class="btn btn-primary" (click)="confirmWarning()">OK</button>
    </div>
  </div>
  <div class="modal-backdrop" (click)="confirmWarning()"></div>
</div>
