<div class="page">
  <div class="page-header">
    <a routerLink="/admin/users" class="back-link">← Liste des utilisateurs</a>
    <h1>Modifier l'utilisateur</h1>
  </div>

  <div class="loading" *ngIf="loading">Chargement...</div>
  <div class="error-banner" *ngIf="error && !loading">{{ error }}</div>

  <div class="card" *ngIf="!loading && form">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="name">Nom complet</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          [class.invalid]="form.get('name')?.invalid && form.get('name')?.touched"
        />
        <span class="field-error" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
          Nom requis
        </span>
      </div>

      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        <span class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          E-mail invalide
        </span>
      </div>

      <div class="field">
        <label for="role">Rôle</label>
        <select id="role" formControlName="role">
          <option value="etudiant">Étudiant</option>
          <option value="professeur">Professeur</option>
          <option value="admin">Administrateur</option>
        </select>
      </div>

      <div class="success-banner" *ngIf="success">
        Modifications enregistrées. Redirection...
      </div>

      <div class="form-actions">
        <a routerLink="/admin/users" class="btn-cancel">Annuler</a>
        <button type="submit" class="btn-primary" [disabled]="form.invalid || saving">
          {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
        </button>
      </div>
    </form>
  </div>
</div>
