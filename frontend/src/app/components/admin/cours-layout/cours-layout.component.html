<div class="bg-white border-b border-base-200 shadow-sm sticky top-0 z-50" *ngIf="cours">
  <div class="max-w-5xl mx-auto px-6">
    <div class="flex items-center gap-2 h-14">

      <!-- Lien retour admin/cours -->
      <a routerLink="/admin/cours" class="text-gray-400 hover:text-gray-600 transition-colors shrink-0" title="Retour aux cours">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
          style="fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>

      <div class="w-px h-5 bg-base-200 shrink-0"></div>

      <!-- Nom du cours → tableau de bord -->
      <a [routerLink]="['/admin/cours', cours.id]"
        routerLinkActive="text-primary font-semibold"
        [routerLinkActiveOptions]="{ exact: true }"
        class="font-semibold text-gray-800 hover:text-primary transition-colors truncate max-w-xs">
        {{ cours.nom }}
      </a>

      <div class="flex items-center gap-1 ml-auto">

        <!-- Exercices -->
        <a [routerLink]="['/admin/cours', cours.id, 'exercices']"
          routerLinkActive="btn-active"
          class="btn btn-sm btn-ghost">
          Exercices
        </a>

        <!-- Modifier -->
        <a [routerLink]="['/admin/cours', cours.id, 'edit']"
          routerLinkActive="btn-active"
          class="btn btn-sm btn-ghost">
          Modifier
        </a>

        <!-- Supprimer -->
        <a [routerLink]="['/admin/cours', cours.id, 'delete']"
          routerLinkActive="btn-active"
          class="btn btn-sm btn-ghost text-error hover:bg-red-50">
          Supprimer
        </a>

      </div>
    </div>
  </div>
</div>

<router-outlet/>
