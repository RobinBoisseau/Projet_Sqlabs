<div class="ia-bar">

  <div class="ia-header">
    <span class="ia-title">Analyse IA de ta tentative</span>
    <button class="ia-close" (click)="closed.emit()">✕</button>
  </div>

  <div class="ia-panels">

    <!-- Dictionnaire -->
    <div class="ia-panel" *ngIf="hasInvalidItems('dictionary')">
      <div class="ia-panel-title">Dictionnaire des données</div>
      <div class="ia-list">
        <label *ngFor="let r of getInvalidRemarques('dictionary')"
               class="ia-item"
               [class.ia-item--warn]="!getState('dictionary', getId(r, 'dictionary'))"
               [class.ia-item--showing]="isShowing('dictionary', getId(r, 'dictionary'))"
               [class.ia-item--ok]="isResolved('dictionary', getId(r, 'dictionary'))">
          <input type="checkbox" class="ia-checkbox"
                 [checked]="!!getState('dictionary', getId(r, 'dictionary'))"
                 [disabled]="isResolved('dictionary', getId(r, 'dictionary'))"
                 (change)="onCheckboxChange('dictionary', r)">
          <div class="ia-content">
            <span class="ia-nom" *ngIf="r.champ">{{ r.champ }}</span>
            <span class="ia-msg">{{ r.message }}</span>
          </div>
          <span class="ia-resolve-btn"
                *ngIf="isShowing('dictionary', getId(r, 'dictionary'))"
                (click)="markResolved('dictionary', r, $event)">
            ✓ Traité
          </span>
        </label>
      </div>
    </div>

    <!-- Dépendances -->
    <div class="ia-panel" *ngIf="hasInvalidItems('dependencies')">
      <div class="ia-panel-title">Dépendances fonctionnelles</div>
      <div class="ia-list">
        <label *ngFor="let r of getInvalidRemarques('dependencies')"
               class="ia-item"
               [class.ia-item--warn]="!getState('dependencies', getId(r, 'dependencies'))"
               [class.ia-item--showing]="isShowing('dependencies', getId(r, 'dependencies'))"
               [class.ia-item--ok]="isResolved('dependencies', getId(r, 'dependencies'))">
          <input type="checkbox" class="ia-checkbox"
                 [checked]="!!getState('dependencies', getId(r, 'dependencies'))"
                 [disabled]="isResolved('dependencies', getId(r, 'dependencies'))"
                 (change)="onCheckboxChange('dependencies', r)">
          <div class="ia-content">
            <span class="ia-nom" *ngIf="r.source">{{ r.source }}</span>
            <span class="ia-msg">{{ r.message }}</span>
          </div>
          <span class="ia-resolve-btn"
                *ngIf="isShowing('dependencies', getId(r, 'dependencies'))"
                (click)="markResolved('dependencies', r, $event)">
            ✓ Traité
          </span>
        </label>
      </div>
    </div>

    <!-- MCD -->
    <div class="ia-panel" *ngIf="hasInvalidItems('mcd')">
      <div class="ia-panel-title">MCD</div>
      <div class="ia-list">
        <label *ngFor="let r of getInvalidRemarques('mcd')"
               class="ia-item"
               [class.ia-item--warn]="!getState('mcd', getId(r, 'mcd'))"
               [class.ia-item--showing]="isShowing('mcd', getId(r, 'mcd'))"
               [class.ia-item--ok]="isResolved('mcd', getId(r, 'mcd'))">
          <input type="checkbox" class="ia-checkbox"
                 [checked]="!!getState('mcd', getId(r, 'mcd'))"
                 [disabled]="isResolved('mcd', getId(r, 'mcd'))"
                 (change)="onCheckboxChange('mcd', r)">
          <div class="ia-content">
            <span class="ia-nom" *ngIf="r.id">{{ r.id }}</span>
            <span class="ia-msg">{{ r.message }}</span>
          </div>
          <span class="ia-resolve-btn"
                *ngIf="isShowing('mcd', getId(r, 'mcd'))"
                (click)="markResolved('mcd', r, $event)">
            ✓ Traité
          </span>
        </label>
      </div>
    </div>

  </div>
</div>
