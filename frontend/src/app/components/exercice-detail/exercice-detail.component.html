<!-- On ajoute cdkDropListGroup ici -->
<div class="workbench-wrapper" *ngIf="exercice" cdkDropListGroup>
  <as-split direction="horizontal" unit="percent" gutterSize="8">

    <!-- COLONNE 1 : Énoncé -->
    <as-split-area [size]="25">
      <app-panel title="Énoncé">
        <h3>{{ exercice.titre }}</h3>
        <p>{{ exercice.enonce }}</p>
      </app-panel>
    </as-split-area>

    <!-- COLONNE 2 : Dictionnaire & Dépendances -->
    <as-split-area [size]="30" *ngIf="exercice.type === 'SQL'">
      <as-split direction="vertical" gutterSize="8">
        
        <as-split-area [size]="50">
          <app-panel title="Dictionnaire des données">
            <app-dictionary-table></app-dictionary-table>
          </app-panel>
        </as-split-area>

        <as-split-area [size]="50">
          <app-panel title="Dépendances">
            <app-dependence-table></app-dependence-table>
          </app-panel>
        </as-split-area>

      </as-split>
    </as-split-area>

    <!-- COLONNE 3 : Zone AntV X6 -->
    <as-split-area [size]="45">
      <app-panel title="Zone de modélisation" [scrollable]="false">
        <div class="canvas-wrapper">
          <div class="canvas-toolbar">
            <app-toll-button icon="⬜" label="Entité" (toolClick)="addEntity()"></app-toll-button>
            <app-toll-button icon="◯" label="Attribut" (toolClick)="addAttributeToSchema()"></app-toll-button>
            <app-toll-button icon="→" label="Relation" (toolClick)="addRelation()"></app-toll-button>
          </div>
          <div id="container" style="flex: 1; width: 100%; background: #fff;"></div>
        </div>
      </app-panel>
    </as-split-area>

  </as-split>
</div>
