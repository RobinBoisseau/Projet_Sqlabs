<div class="workbench-wrapper" *ngIf="exercice">

  <as-split direction="horizontal" unit="percent" gutterSize="8" class="main-split">

    <!-- COLUMN 1: Énoncé -->
    <as-split-area [size]="sizes.enonce" [minSize]="0" [maxSize]="100">
      <div class="col-side">
        <div class="col-collapsed-labels" [style.display]="isCollapsed.enonce ? 'flex' : 'none'">
          <span class="col-collapsed-label">Énoncé</span>
        </div>
        <div class="col-side-content col-side-content--scrollable"
             [style.display]="isCollapsed.enonce ? 'none' : 'flex'">
          <h3 class="ex-title">{{ exercice.title }}</h3>
          <div class="ex-statement" [innerHTML]="safeStatement"></div>
        </div>
        <div class="col-side-tab col-side-tab--right" (click)="togglePanel('enonce')" role="button">
          <svg class="col-tab-arrow"
               [style.transform]="isCollapsed.enonce ? 'rotate(0deg)' : 'rotate(180deg)'"
               xmlns="http://www.w3.org/2000/svg" width="14" height="14"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      </div>
    </as-split-area>

    <!-- COLUMN 2: Dictionnaire + Dépendances -->
    <as-split-area [size]="sizes.dictionnaire" [minSize]="0" [maxSize]="100" *ngIf="exercice.type === 'SQL'" cdkDropListGroup>
      <div class="col-middle">

        <!-- Contenu (toujours dans le DOM pour préserver l'état) -->
        <div class="col-middle-content" [style.display]="isCollapsed.dictionnaire ? 'none' : 'flex'">
          <as-split direction="vertical" gutterSize="8" style="flex:1;min-height:0">

            <as-split-area [size]="sizesVertical.dictionnaire" [minSize]="0" [maxSize]="100">
              <div class="row-panel">
                <div class="row-panel-content" [style.display]="isCollapsed.dictionnaireV ? 'none' : 'flex'">
                  <app-panel title="Dictionnaire des données">
                    <app-dictionary-table
                      [lines]="dictionary"
                      [iaRemarks]="dictionaryIaRemarks"
                      (dictionaryChanged)="onDictionaryChanged($event)">
                    </app-dictionary-table>
                  </app-panel>
                </div>
                <div class="row-panel-tab row-panel-tab--bottom" (click)="toggleVerticalPanel('dictionnaire')" role="button">
                  <svg class="col-tab-arrow"
                       [style.transform]="isCollapsed.dictionnaireV ? 'rotate(90deg)' : 'rotate(270deg)'"
                       xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                       viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18l6-6-6-6"/>
                  </svg>
                </div>
              </div>
            </as-split-area>

            <as-split-area [size]="sizesVertical.dependances" [minSize]="0" [maxSize]="100">
              <div class="row-panel">
                <div class="row-panel-tab row-panel-tab--top" (click)="toggleVerticalPanel('dependances')" role="button">
                  <svg class="col-tab-arrow"
                       [style.transform]="isCollapsed.dependancesV ? 'rotate(270deg)' : 'rotate(90deg)'"
                       xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                       viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18l6-6-6-6"/>
                  </svg>
                </div>
                <div class="row-panel-content" [style.display]="isCollapsed.dependancesV ? 'none' : 'flex'">
                  <app-panel title="Dépendances fonctionnelles">
                    <app-dependence-table
                      [lines]="dependencies"
                      [technicalNames]="technicalNames"
                      [iaRemarks]="dependencyIaRemarks"
                      (dependenciesChanged)="onDependenciesChanged($event)">
                    </app-dependence-table>
                  </app-panel>
                </div>
              </div>
            </as-split-area>

          </as-split>
        </div>

        <!-- Labels verticaux quand la colonne est réduite -->
        <div class="col-collapsed-labels" [style.display]="isCollapsed.dictionnaire ? 'flex' : 'none'">
          <span class="col-collapsed-label">Dictionnaire</span>
          <span class="col-collapsed-label">Dépendances</span>
        </div>

        <!-- Tab sur le bord droit : toujours visible -->
        <div class="col-middle-tab" (click)="togglePanel('dictionnaire')" role="button" aria-label="Réduire/agrandir">
          <svg class="col-tab-arrow"
            [style.transform]="isCollapsed.dictionnaire ? 'rotate(0deg)' : 'rotate(180deg)'"
            xmlns="http://www.w3.org/2000/svg" width="14" height="14"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>

      </div>
    </as-split-area>

    <!-- COLUMN 3: Zone de modélisation -->
    <as-split-area [size]="sizes.modelisation" [minSize]="0" [maxSize]="100">
      <div class="col-side">
        <div class="col-side-tab col-side-tab--left" (click)="togglePanel('modelisation')" role="button">
          <svg class="col-tab-arrow"
               [style.transform]="isCollapsed.modelisation ? 'rotate(180deg)' : 'rotate(0deg)'"
               xmlns="http://www.w3.org/2000/svg" width="14" height="14"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
        <div class="col-collapsed-labels" [style.display]="isCollapsed.modelisation ? 'flex' : 'none'">
          <span class="col-collapsed-label">Zone de modélisation</span>
        </div>
        <div class="col-side-content col-side-content--fill"
             [style.display]="isCollapsed.modelisation ? 'none' : 'flex'">
          <app-mcd-editor
            [slug]="exercice.slug"
            [mcd]="mcd"
            [iaRemarks]="mcdIaRemarks"
            (saveRequested)="save()">
          </app-mcd-editor>
        </div>
      </div>
    </as-split-area>

  </as-split>

  <app-return-ia
    *ngIf="showIaResults && iaResults"
    [results]="iaResults!"
    (closed)="showIaResults = false"
    (itemChecked)="onIaItemChecked($event)">
  </app-return-ia>

  <app-success-page
    *ngIf="showSuccessPage"
    [nextSlug]="nextSlug"
    (closed)="showSuccessPage = false">
  </app-success-page>

  <app-tentative-button [isDisabled]="isTentativeDisabled" (submitted)="onTentativeSubmitted()">
  </app-tentative-button>
</div>

<div *ngIf="!exercice" class="loading-overlay">
  <p>Loading exercise...</p>
</div>

<!-- Overlay IA -->
<div class="submission-overlay" *ngIf="isSubmitting">
  <div class="overlay-content">
    <div class="overlay-spinner"></div>
    <p class="overlay-text">Analyse de la tentative par l'IA...</p>
  </div>
</div>
