<div class="workbench-wrapper" *ngIf="exercice">
  <as-split direction="horizontal" unit="percent" gutterSize="8">

    <as-split-area [size]="25">
      <app-panel title="Énoncé">
        <h3>{{ exercice.titre }}</h3>
        <div class="ex-enonce">{{ exercice.enonce }}</div>
      </app-panel>
    </as-split-area>

    <as-split-area [size]="30" *ngIf="exercice.type === 'SQL' && mcd" cdkDropListGroup>
      <as-split direction="vertical" gutterSize="8">
        <as-split-area [size]="50">
          <app-panel title="Dictionnaire">
            <app-dictionary-table [lignes]="mcd.Entities" (onNomSupprime)="depTable.nettoyerChampSupprime($event)"></app-dictionary-table>
          </app-panel>
        </as-split-area>
        <as-split-area [size]="50">
          <app-panel title="Associations">
            <app-dependence-table #depTable [lignes]="mcd.Association"></app-dependence-table>
          </app-panel>
        </as-split-area>
      </as-split>
    </as-split-area>

    <as-split-area [size]="45">
      <app-panel title="Modélisation" [scrollable]="false">
        <app-mcd-editor *ngIf="mcd" [mcd]="mcd" (saveRequested)="sauvegarder()"></app-mcd-editor>
      </app-panel>
    </as-split-area>

  </as-split>
</div>
