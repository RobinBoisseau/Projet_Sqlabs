<div class="workbench-wrapper" *ngIf="exercice">
  <as-split direction="horizontal" unit="percent" gutterSize="8" style="height: 95vh;">

    <!-- COLUMN 1: Énoncé -->
    <as-split-area [size]="25">
      <app-panel title="Énoncé">
        <h3 class="ex-title">{{ exercice.title }}</h3>
        <div class="ex-statement">{{ exercice.statement }}</div>
      </app-panel>
    </as-split-area>

    <!-- COLUMN 2: Dictionnaire des données -->
    <as-split-area [size]="30" *ngIf="exercice.type === 'SQL'" cdkDropListGroup>
      <as-split direction="vertical" gutterSize="8">

        <!-- Dictionary -->
        <as-split-area [size]="50">
          <app-panel title="Dictionnaire des données">
            <app-dictionary-table [lines]="dictionary" (dictionaryChanged)="onDictionaryChanged($event)">
            </app-dictionary-table>
          </app-panel>
        </as-split-area>

        <!-- Dépendances fonctionnelles -->
        <as-split-area [size]="50">
          <app-panel title="Dépendances fonctionnelles">
            <app-dependence-table [lines]="dependencies" [technicalNames]="technicalNames"
              (dependenciesChanged)="onDependenciesChanged($event)">
            </app-dependence-table>
          </app-panel>
        </as-split-area>

      </as-split>
    </as-split-area>

    <!-- COLUMN 3: Modeling Zone -->
    <as-split-area [size]="45">
      <app-panel title="Zone de modélisation" [scrollable]="false">
        <app-mcd-editor [slug]="exercice.slug" [mcd]="mcd" (saveRequested)="save()">
        </app-mcd-editor>
      </app-panel>
    </as-split-area>

  </as-split>
</div>

<div *ngIf="!exercice" class="loading-overlay">
  <p>Loading exercise...</p>
</div>
