<div class="workbench-wrapper" *ngIf="exercice">
  <as-split direction="horizontal" unit="percent" gutterSize="8">

    <!-- COLONNE 1 : ÉNONCÉ -->
    <as-split-area [size]="25">
      <app-panel title="Énoncé">
        <h3 class="ex-title">{{ exercice.title }}</h3>
        <div class="ex-statement">{{ exercice.statement }}</div>
      </app-panel>
    </as-split-area>

    <!-- COLONNE 2 : TABLEAUX -->
    <as-split-area [size]="30" *ngIf="exercice.type === 'SQL' && mcd" cdkDropListGroup>
      <as-split direction="vertical" gutterSize="8">
        
        <!-- DICTIONNAIRE (Gère les Entités) -->
        <as-split-area [size]="50">
          <app-panel title="Dictionnaire des données">
            <app-dictionary-table  
              (onNomSupprime)="dependenceTable.nettoyerChampSupprime($event)"
              (nomsChanged)="nomsTechniques = $event">
            </app-dictionary-table>
          </app-panel>
        </as-split-area>

        <!-- DÉPENDANCES (Gère les Dépendances Fonctionnelles) -->
        <as-split-area [size]="50">
          <app-panel title="Dépendances Fonctionnelles">
            <!-- ON CHANGE ICI : On envoie 'mcd.Dependences' et non plus 'Association' -->
            <app-dependence-table 
             #dependenceTable
             [nomsTechniques]="nomsTechniques">
            </app-dependence-table>
          </app-panel>
        </as-split-area>

      </as-split>
    </as-split-area>

    <!-- COLONNE 3 : MODÉLISATION (Gère le dessin des Entités + Associations) -->
    <as-split-area [size]="45">
      <app-panel title="Zone de modélisation" [scrollable]="false">
        <app-mcd-editor 
          *ngIf="mcd" 
          [mcd]="mcd" 
          (saveRequested)="sauvegarder()">
        </app-mcd-editor>
      </app-panel>
    </as-split-area>

  </as-split>
</div>
