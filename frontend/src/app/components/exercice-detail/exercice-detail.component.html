<div class="workbench-wrapper" *ngIf="exercice">
  <as-split direction="horizontal" unit="percent" gutterSize="8">

    <!-- COLONNE 1 : Énoncé (25%) -->
    <as-split-area [size]="25">
      <app-panel title="Énoncé">
        <div class="enonce-container">
          <h3 class="exercice-title">{{ exercice.titre }}</h3>
          <p class="enonce-text">{{ exercice.enonce }}</p>
          <span class="type-badge" *ngIf="exercice.type">{{ exercice.type }}</span>
        </div>
      </app-panel>
    </as-split-area>


    <!-- COLONNE 2 : Dico & Dépendances (30%) -->
    <as-split-area [size]="30">
      <as-split direction="vertical" gutterSize="8">
        
        <!-- Haut : Dictionnaire -->
        <as-split-area [size]="50">
          <app-panel title="Dictionnaire des données">
            <div class="dictionnaire-actions">
              <p *ngIf="attributes.length === 0" class="placeholder">Aucun attribut pour le moment.</p>
              
              <!-- Si tu as déjà fait le tableau d'attributs, remets-le ici -->
              
              <button class="btn-add" (click)="addAttribute()">+ Ajouter un attribut</button>
            </div>
          </app-panel>
        </as-split-area>

        <!-- Bas : Dépendances -->
        <as-split-area [size]="50">
          <app-panel title="Dépendances fonctionnelles">
            <div class="dependances-actions">
              <button class="btn-add">+ Ajouter une dépendance</button>
            </div>
          </app-panel>
        </as-split-area>

      </as-split>
    </as-split-area>


    <!-- COLONNE 3 : Zone de Schéma (45%) -->
    <as-split-area [size]="45">
      <app-panel title="Zone de modélisation" [scrollable]="false">
        <div class="canvas-wrapper">
          
          <!-- Barre d'outils interne au panel -->
          <div class="canvas-toolbar">
            <button class="tool-item">⬜ Entité</button>
            <button class="tool-item">◯ Attribut</button>
            <button class="tool-item">→ Relation</button>
          </div>
          
          <!-- La grille à pointillés -->
          <div class="dot-grid-canvas">
            <!-- Les futurs schémas viendront ici -->
          </div>

        </div>
      </app-panel>
    </as-split-area>

  </as-split>
</div>

<!-- Message d'attente si l'exercice n'est pas encore chargé -->
<div *ngIf="!exercice" class="loading-overlay">
  <p>Chargement de l'exercice...</p>
</div>
