<div class="workbench-wrapper" *ngIf="exercice">
  <as-split direction="horizontal" unit="percent" gutterSize="8">

    <!-- COLUMN 1: Statement -->
    <as-split-area [size]="25">
      <app-panel title="Statement">
        <h3 class="ex-title">{{ exercice.title }}</h3>
        <div class="ex-statement">{{ exercice.statement }}</div>
      </app-panel>
    </as-split-area>

    <!-- COLUMN 2: Dictionary & Dependencies -->
    <as-split-area [size]="30" *ngIf="exercice.type === 'SQL'" cdkDropListGroup>
      <as-split direction="vertical" gutterSize="8">

        <!-- Dictionary -->
        <as-split-area [size]="50">
          <app-panel title="Data Dictionary">
            <app-dictionary-table
              [lines]="dictionary"
              (dictionaryChanged)="onDictionaryChanged($event)">
            </app-dictionary-table>
          </app-panel>
        </as-split-area>

        <!-- Functional Dependencies -->
        <as-split-area [size]="50">
          <app-panel title="Functional Dependencies">
            <app-dependence-table
              [lines]="dependencies"
              [technicalNames]="technicalNames"
              (dependenciesChanged)="onDependenciesChanged($event)">
            </app-dependence-table>
          </app-panel>
        </as-split-area>

      </as-split>
    </as-split-area>

    <!-- COLUMN 3: Modeling Zone -->
    <as-split-area [size]="45">
      <app-panel title="Modeling Zone" [scrollable]="false">
        <app-mcd-editor
          [mcd]="mcd"
          (saveRequested)="save()">
        </app-mcd-editor>
      </app-panel>
    </as-split-area>

  </as-split>
</div>

<div *ngIf="!exercice" class="loading-overlay">
  <p>Loading exercise...</p>
</div>
