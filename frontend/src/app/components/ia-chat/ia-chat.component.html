<div class="max-w-2xl mx-auto px-6 py-10 flex flex-col gap-8">
  <h1 class="text-2xl font-bold text-gray-800">Test IA</h1>

  <div *ngIf="erreur" class="alert alert-error">{{ erreur }}</div>

  <!-- Test météo -->
  <div>
    <button (click)="interroger()" [disabled]="loading" class="btn btn-primary mb-4">
      {{ loading ? 'En attente...' : 'Interroger l\'IA' }}
    </button>
    <div *ngIf="reponse" class="bg-white border border-base-200 rounded-xl p-5 shadow-sm">
      <p class="text-sm text-gray-400 mb-2">Réponse de Mistral :</p>
      <p class="text-gray-800 whitespace-pre-wrap">{{ reponse }}</p>
    </div>
  </div>

  <!-- Analyse MCD -->
  <div>
    <h2 class="text-lg font-semibold text-gray-700 mb-3">Analyse MCD — Personne / Voiture / Conduire</h2>
    <button (click)="analyserMcd()" [disabled]="loadingMcd" class="btn btn-secondary mb-4">
      {{ loadingMcd ? 'Analyse en cours...' : 'Analyser le MCD' }}
    </button>
    <div *ngIf="reponseMcd.length > 0" class="flex flex-col gap-3">
      <div *ngFor="let r of reponseMcd" class="bg-white border border-base-200 rounded-xl p-4 shadow-sm flex gap-3 items-start">
        <span class="badge badge-outline shrink-0">{{ r.entite ?? 'Global' }}</span>
        <p class="text-gray-800 text-sm">{{ r.message }}</p>
      </div>
      <details class="mt-2">
        <summary class="text-xs text-gray-400 cursor-pointer">Voir le JSON brut</summary>
        <pre class="bg-gray-50 border border-base-200 rounded-xl p-4 text-xs text-gray-600 overflow-auto mt-2">{{ reponseMcdJson }}</pre>
      </details>
    </div>
  </div>
</div>
