<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Connexion</h1>
    <p class="auth-subtitle">Bienvenue sur <strong>Sqlabs</strong></p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="vous@exemple.com"
          [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        <span class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          E-mail invalide
        </span>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.invalid]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        <span class="field-error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Mot de passe requis
        </span>
      </div>

      <div class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="auth-link">
      Pas encore de compte ? <a routerLink="/register">Créer un compte</a>
    </p>
  </div>
</div>
