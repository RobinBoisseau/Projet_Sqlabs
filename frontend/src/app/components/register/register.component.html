<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-subtitle">Rejoignez <strong>Sqlabs</strong></p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="name">Nom complet</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Jean Dupont"
          [class.invalid]="form.get('name')?.invalid && form.get('name')?.touched"
        />
        <span class="field-error" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
          Nom requis
        </span>
        <span class="field-error" *ngIf="getFieldError('name')">{{ getFieldError('name') }}</span>
      </div>

      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="vous@exemple.com"
          [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        <span class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          E-mail invalide
        </span>
        <span class="field-error" *ngIf="getFieldError('email')">{{ getFieldError('email') }}</span>
      </div>

      <div class="field">
        <label for="role">Rôle</label>
        <select id="role" formControlName="role">
          <option value="etudiant">Étudiant</option>
          <option value="professeur">Professeur</option>
        </select>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="8 caractères minimum"
          [class.invalid]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        <span class="field-error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Minimum 8 caractères
        </span>
        <span class="field-error" *ngIf="getFieldError('password')">{{ getFieldError('password') }}</span>
      </div>

      <div class="field">
        <label for="password_confirmation">Confirmer le mot de passe</label>
        <input
          id="password_confirmation"
          type="password"
          formControlName="password_confirmation"
          placeholder="••••••••"
          [class.invalid]="form.get('password_confirmation')?.invalid && form.get('password_confirmation')?.touched"
        />
        <span class="field-error" *ngIf="form.get('password_confirmation')?.invalid && form.get('password_confirmation')?.touched">
          Confirmation requise
        </span>
      </div>

      <div class="error-banner" *ngIf="errorMessage && !getFieldError('email') && !getFieldError('name') && !getFieldError('password')">{{ errorMessage }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Création...' : 'Créer mon compte' }}
      </button>
    </form>

    <p class="auth-link">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
