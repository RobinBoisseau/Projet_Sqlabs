<div class="dict-container">
  <div class="table-scroll-area">
    <table class="dict-table">
      <thead>
        <tr>
          <th>Business Name</th>
          <th>Technical Name</th>
          <th style="width: 100px;">Type</th>
          <th style="width: 40px;"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let line of lines; let i = index; trackBy: trackByFn">
          <td>
            <input type="text" [(ngModel)]="line.name" (ngModelChange)="emitChanges()" placeholder="ex: Customer Name">
          </td>
          <td>
            <input type="text" [(ngModel)]="line.TechnicalName" (ngModelChange)="emitChanges()" placeholder="ex: customer_name">
          </td>
          <td>
            <select [(ngModel)]="line.Type" (ngModelChange)="emitChanges()">
              <option value=""></option>
              <option value="INT">INT</option>
              <option value="VARCHAR2">VARCHAR2</option>
              <option value="NUMBER">NUMBER</option>
              <option value="DATE">DATE</option>
            </select>
          </td>
           <div class="actions-column">
            <div class="dropdown">
              <button class="dots-btn">⋮</button>
              <div class="dropdown-content">
                <a (click)="duplicateLine(i)">Dupliquer</a>
                <a (click)="removeLine(i)" class="delete-text">Supprimer</a>
              </div>
           </div>
      </div>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="add-section">
    <app-add-button (btnClick)="addLine()" label="Add new data"></app-add-button>
  </div>
</div>
