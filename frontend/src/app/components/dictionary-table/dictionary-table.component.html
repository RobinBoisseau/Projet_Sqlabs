<div class="dict-container">
  <!-- Désactive l'auto-scroll pour éviter les sauts visuels -->
  <div cdkDropList [cdkDropListAutoScrollDisabled]="true">
    <table class="dict-table">
      <thead>
        <tr>
          <th class="col-divider">Nom Métier</th>
          <th class="col-divider">Nom technique</th>
          <th>Type</th>
          <th class="actions-header"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let line of lines; let i = index">
          
          <!-- Nom Métier -> line.name -->
          <td class="col-divider">
            <input type="text" [(ngModel)]="line.name" placeholder="ex: Nom du client">
          </td>

          <!-- Nom Technique -> line.TechnicalName -->
          <td class="col-divider">
            <div class="drag-zone">
              <input type="text" 
                     [(ngModel)]="line.TechnicalName" 
                     (ngModelChange)="emitNoms()" 
                     placeholder="ex: nom_cli">
              
              <!-- L'étiquette bleue déplaçable -->
              <div *ngIf="line.TechnicalName" 
                   class="tag-pill" 
                   cdkDrag 
                   [cdkDragData]="line.TechnicalName">
                {{ line.TechnicalName }}
              </div>
            </div>
          </td>

          <!-- Type -> line.Type -->
          <td class="type-cell">
            <select [(ngModel)]="line.Type">
              <option value=""></option>
              <option value="INT">INT</option>
              <option value="VARCHAR2">VARCHAR2</option>
              <option value="NUMBER">NUMBER</option>
              <option value="DATE">DATE</option>
            </select>
          </td>

          <!-- Menu Actions ⋮ -->
          <td class="actions-cell">
            <div class="dropdown">
              <button class="dots-btn">⋮</button>
              <div class="dropdown-content">
                <a (click)="dupliquerLigne(i)">Dupliquer</a>
                <a (click)="supprimerLigne(i)" class="delete-text">Supprimer</a>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Bouton Ajouter -->
  <div class="add-section">
    <button class="dashed-add-btn" (click)="ajouterLigne()">
      + Ajouter une nouvelle donnée
    </button>
  </div>
</div>
