<div class="dict-container">
  <div class="table-scroll-area">
    <table class="dict-table">
      <thead>
        <tr>
          <th>Nom Métier</th>
          <th>Nom technique</th>
          <th>Type</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let line of lines; let i = index; trackBy: trackByFn">
          <td>
            <input type="text" [(ngModel)]="line.name" (ngModelChange)="onDataChange()" placeholder="ex: Nom du client">
          </td>
          <td>
            <input type="text" [(ngModel)]="line.TechnicalName" (ngModelChange)="onDataChange()" placeholder="ex: nom_cli">
          </td>
          <td>
            <select [(ngModel)]="line.Type" (ngModelChange)="onDataChange()">
              <option value=""></option>
              <option value="INT">INT</option>
              <option value="VARCHAR2">VARCHAR2</option>
              <option value="NUMBER">NUMBER</option>
              <option value="DATE">DATE</option>
            </select>
          </td>
          <td>
            <button class="delete-btn" (click)="supprimerLigne(i)">×</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  
  <div class="add-section">
    <button class="add-data-btn" (click)="ajouterLigne()">
      Ajouter une nouvelle donnée
    </button>
  </div>
</div>
