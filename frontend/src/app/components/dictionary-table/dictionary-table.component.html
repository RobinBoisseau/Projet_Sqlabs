<div class="dict-container">
  <!-- On désactive l'auto-scroll pour éviter que le tableau saute pendant le drag -->
  <div cdkDropList id="dictList" [cdkDropListAutoScrollDisabled]="true">
    <table class="dict-table">
      <thead>
        <tr>
          <th class="col-divider">Nom Métier</th>
          <th class="col-divider">Nom technique</th>
          <th>Type</th>
          <th class="actions-header"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let ligne of lignes; let i = index">
          <!-- Nom Métier -->
          <td class="col-divider">
            <input type="text" [(ngModel)]="ligne.NomMetier" placeholder="">
          </td>

          <!-- Nom Technique + Étiquette pour le Drag -->
          <td class="col-divider">
            <div class="drag-zone">
              <input type="text" [(ngModel)]="ligne.NomTechnique">
              
              <!-- L'étiquette bleue qui apparaît quand on écrit -->
              <div *ngIf="ligne.NomTechnique" 
                   class="tag-pill" 
                   cdkDrag 
                   [cdkDragData]="ligne.NomTechnique">
                {{ ligne.NomTechnique }}
              </div>
            </div>
          </td>

          <!-- Type avec choix vide par défaut -->
          <td class="type-cell">
            <select [(ngModel)]="ligne.Type">
              <option value="">-- Choisir --</option>
              <option value="INT">INT</option>
              <option value="VARCHAR2">VARCHAR2</option>
              <option value="NUMBER">NUMBER</option>
              <option value="DATE">DATE</option>
            </select>
          </td>

          <!-- Menu Actions ⋮ -->
          <td class="actions-cell">
            <div class="dropdown">
              <button class="dots-btn">⋮</button>
              <div class="dropdown-content">
                <a (click)="dupliquerLigne(i)">Dupliquer</a>
                <a (click)="supprimerLigne(i)" class="delete-text">Supprimer</a>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Bouton Ajouter en bas -->
  <div class="add-section">
    <button class="dashed-add-btn" (click)="ajouterLigne()">
      + Ajouter une nouvelle donnée
    </button>
  </div>
</div>
