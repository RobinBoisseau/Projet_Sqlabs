<div class="dict-container">
  <table class="dict-table">
    <thead>
      <tr>
        <th>Nom Métier</th>
        <th>Nom technique</th>
        <th>Type</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let ligne of lignes; let i = index">
        <td><input [(ngModel)]="ligne.NomMetier" placeholder="ex: Nom client"></td>
        <td class="drag-cell">
          <input [(ngModel)]="ligne.NomTechnique" placeholder="ex: nom_cli">
          <!-- Étiquette draggable qui apparaît quand on a tapé un nom -->
          <div *ngIf="ligne.NomTechnique" 
               class="tag-pill" 
               cdkDrag 
               [cdkDragData]="ligne.NomTechnique"
               cdkDragPreviewContainer="global">
            {{ ligne.NomTechnique }}
          </div>
        </td>
        <td>
          <select [(ngModel)]="ligne.Type">
            <option value="VARCHAR2">VARCHAR2</option>
            <option value="NUMBER">NUMBER</option>
            <option value="DATE">DATE</option>
          </select>
        </td>
        <td class="actions-cell">
          <div class="dropdown">
            <button class="dots-btn">⋮</button>
            <div class="dropdown-content">
              <a (click)="dupliquerLigne(i)">Dupliquer</a>
              <a (click)="supprimerLigne(i)" class="delete-text">Supprimer</a>
            </div>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
  <button class="add-row-btn" (click)="ajouterLigne()">+ Ajouter une nouvelle donnée</button>
</div>
