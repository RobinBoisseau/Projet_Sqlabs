<div class="dict-container">
  <div class="table-scroll-area">
    <table class="dict-table">
      <thead>
        <tr>
          <th>Nom Métier <app-info-tooltip text="Nom utilisé en langage courant (ex: Identifiant du client)"></app-info-tooltip> </th>
          <th>Nom Technique<app-info-tooltip text="Nom utilisé en base de données (ex: id_Client)"></app-info-tooltip></th>
          <th style="width: 100px;">Type<app-info-tooltip text="Nature définissant les valeurs qu'elle peut contenir (ex: entier, date...)"></app-info-tooltip></th>
          <th style="width: 40px;"></th>
        </tr>
      </thead>
      <tbody>
        <tr #tableRow *ngFor="let line of lines; let i = index; trackBy: trackByFn">
          <td>
            <input type="text" [(ngModel)]="line.name" (ngModelChange)="emitChanges()" placeholder="ex: Customer Name">
          </td>
          <td>
            <input type="text" [(ngModel)]="line.TechnicalName" (blur)="emitChanges()" placeholder="ex: customer_name">
          </td>
          <td>
            <select [(ngModel)]="line.Type" (ngModelChange)="emitChanges()">
              <option value=""></option>
              <option value="INT">Entier</option>
              <option value="VARCHAR2">AlphaNumérique</option>
              <option value="FLOAT">Décimal</option>
              <option value="BOOL">Booléen</option>
              <option value="DATE">Date</option>
            </select>
          </td>
          <td>
            <div class="dropdown">
              <button class="dots-btn">⋮</button>
              <div class="dropdown-content">
                <button type="button" (click)="duplicateLine(i)" class="dropdown-item">Dupliquer</button>
                <button type="button" (click)="removeLine(i)" class="dropdown-item delete-text">Supprimer</button>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="add-section">
    <app-add-button (btnClick)="addLine()" label="Ajouter une nouvelle donnée"></app-add-button>
  </div>
</div>
