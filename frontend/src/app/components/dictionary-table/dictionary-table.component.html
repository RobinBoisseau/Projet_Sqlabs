<div class="dict-container">
  <div class="table-scroll-area">
    <table class="dict-table">
      <thead>
        <tr>
          <th>Nom Métier</th>
          <th>Nom Technique</th>
          <th style="width: 100px;">Type</th>
          <th style="width: 40px;"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let line of lines; let i = index; trackBy: trackByFn">
          <td>
            <input type="text" [(ngModel)]="line.name" (ngModelChange)="emitChanges()" placeholder="ex: Customer Name">
          </td>
          <td>
            <input type="text" [(ngModel)]="line.TechnicalName" (ngModelChange)="emitChanges()"
              placeholder="ex: customer_name">
          </td>
          <td>
            <select [(ngModel)]="line.Type" (ngModelChange)="emitChanges()">
              <option value=""></option>
              <option value="INT">INT</option>
              <option value="VARCHAR2">VARCHAR2</option>
              <option value="NUMBER">NUMBER</option>
              <option value="DATE">DATE</option>
            </select>
          </td>
          <td>
            <div class="dropdown">
              <button class="dots-btn">⋮</button>
              <div class="dropdown-content">
                <button type="button" (click)="duplicateLine(i)" class="dropdown-item">Dupliquer</button>
                <button type="button" (click)="removeLine(i)" class="dropdown-item delete-text">Supprimer</button>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="add-section">
    <app-add-button (btnClick)="addLine()" label="Ajouter une nouvelle donnée"></app-add-button>
  </div>
</div>
