<div class="container">
  <h1 class="main-title">Liste des Exercices</h1>

  <!-- SECTION SQL -->
  <div class="section-container" *ngIf="sqlExercises.length > 0">
    <h2 class="section-header">📁 Exercices SQL</h2>
    <div class="exercise-list">
      <div class="exercise-row" *ngFor="let exo of sqlExercises; let i = index">
        <a [routerLink]="['/exercice', exo.slug]" class="exercise-info">
          <span class="exo-number">Exercice {{ i + 1 }} :</span>
          <span class="exo-title">{{ exo.titre }}</span>
        </a>
        
        <!-- L'état sur la même ligne, à droite -->
        <div class="status-zone">
          <span [class]="exo.est_termine ? 'status-done' : 'status-todo'">
            {{ exo.est_termine ? '✅ Fait' : '□ À faire' }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- SECTION BPMN (Pareil ici) -->
  <div class="section-container" *ngIf="bpmnExercises.length > 0">
    <h2 class="section-header">📊 Exercices BPMN</h2>
    <div class="exercise-list">
      <div class="exercise-row" *ngFor="let exo of bpmnExercises; let i = index">
        <a [routerLink]="['/exercice', exo.slug]" class="exercise-info">
          <span class="exo-number">Exercice {{ i + 1 }} :</span>
          <span class="exo-title">{{ exo.titre }}</span>
        </a>
        <div class="status-zone">
          <span [class]="exo.est_termine ? 'status-done' : 'status-todo'">
            {{ exo.est_termine ? '✅ Fait' : '□ À faire' }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
