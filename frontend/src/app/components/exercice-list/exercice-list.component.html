<div class="container">
  <h1 class="main-title">Liste des Exercices</h1>

  <!-- SECTION SQL -->
  <div class="section-container" *ngIf="sqlExercises.length > 0">
    <h2 class="section-header">📁 Exercices SQL</h2>
    <div class="exercise-list">
      <app-exercice-card 
        *ngFor="let exo of sqlExercises; let i = index" 
        [exo]="exo" 
        [index]="i">
      </app-exercice-card>
    </div>
  </div>

  <!-- SECTION BPMN -->
  <div class="section-container" *ngIf="bpmnExercises.length > 0">
    <h2 class="section-header">📊 Exercices BPMN</h2>
    <div class="exercise-list">
      <app-exercice-card 
        *ngFor="let exo of bpmnExercises; let i = index" 
        [exo]="exo" 
        [index]="i">
      </app-exercice-card>
    </div>
  </div>

  <!-- MESSAGE SI VIDE -->
  <div *ngIf="sqlExercises.length === 0 && bpmnExercises.length === 0" class="loading-msg">
    Aucun exercice trouvé. Vérifiez la connexion à Laravel.
  </div>
</div>
