<div class="max-w-3xl mx-auto px-6 py-10">

  <div *ngIf="loading" class="text-gray-400">Chargement...</div>
  <div *ngIf="error" class="alert alert-error mb-6"><span>{{ error }}</span></div>

  <!-- ── Vue cours spécifique ── -->
  <ng-container *ngIf="!loading && !error && coursNom">

    <div class="mb-8">
      <a routerLink="/" class="text-sm text-primary hover:underline">← Accueil</a>
      <h1 class="text-3xl font-bold text-gray-800 mt-1">{{ coursNom }}</h1>
      <p class="text-sm text-gray-400 mt-1">{{ courseExercises.length }} exercice{{ courseExercises.length > 1 ? 's' : '' }}</p>
    </div>

    <div *ngIf="courseExercises.length === 0" class="text-gray-400 py-12 text-center">
      Ce cours ne contient pas encore d'exercices.
    </div>

    <div class="flex flex-col gap-3">
      <app-exercice-card
        *ngFor="let exo of courseExercises; let i = index"
        [exo]="exo"
        [index]="i"
        [coursId]="coursId">
      </app-exercice-card>
    </div>

  </ng-container>

  <!-- ── Vue tous les exercices ── -->
  <ng-container *ngIf="!loading && !error && !coursNom">

    <h1 class="text-3xl font-bold text-gray-800 mb-8">Liste des exercices</h1>

    <!-- SQL -->
    <section *ngIf="sqlExercises.length > 0" class="mb-10">
      <div class="flex items-center gap-2 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2 1.5 3 3.5 3h9c2 0 3.5-1 3.5-3V7c0-2-1.5-3-3.5-3h-9C5.5 4 4 5 4 7zm0 5h16"/>
        </svg>
        <h2 class="text-lg font-semibold text-gray-700">SQL</h2>
        <span class="badge badge-primary badge-sm">{{ sqlExercises.length }}</span>
      </div>
      <div class="flex flex-col gap-3">
        <app-exercice-card
          *ngFor="let exo of sqlExercises; let i = index"
          [exo]="exo"
          [index]="i">
        </app-exercice-card>
      </div>
    </section>

    <!-- BPMN -->
    <section *ngIf="bpmnExercises.length > 0" class="mb-10">
      <div class="flex items-center gap-2 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7"/>
        </svg>
        <h2 class="text-lg font-semibold text-gray-700">BPMN</h2>
        <span class="badge badge-secondary badge-sm">{{ bpmnExercises.length }}</span>
      </div>
      <div class="flex flex-col gap-3">
        <app-exercice-card
          *ngFor="let exo of bpmnExercises; let i = index"
          [exo]="exo"
          [index]="i">
        </app-exercice-card>
      </div>
    </section>

  </ng-container>

</div>
