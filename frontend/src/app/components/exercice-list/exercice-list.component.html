<div class="container">
  <h1>Liste des exercices</h1>

  <!-- SECTION SQL -->
  <section class="type-section">
    <h2 class="category-title">📁 Exercices SQL</h2>
    <div class="exercise-card" *ngFor="let exo of sqlExercises">
      <div class="left-part">
        <!-- Lien cliquable à gauche (icône d'action) -->
        <a [routerLink]="['/exercice', exo.slug]" class="open-link" title="Ouvrir l'exercice">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <span class="exercise-info">Exercice {{ exo.id }} : <strong>{{ exo.titre }}</strong></span>
      </div>

      <div class="right-part">
        <!-- Badge de statut style "Bouton Moodle" -->
        <span [class]="'status-badge ' + (exo.etat === 'Fait' ? 'done' : 'todo')">
          {{ exo.etat === 'Fait' ? 'Terminé' : 'À faire' }}
        </span>
      </div>
    </div>
  </section>

  <!-- SECTION BPMN -->
  <section class="type-section">
    <h2 class="category-title">📊 Exercices BPMN</h2>
    <div class="exercise-card" *ngFor="let exo of bpmnExercises">
      <div class="left-part">
        <a [routerLink]="['/exercice', exo.slug]" class="open-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <span class="exercise-info">Exercice {{ exo.id }} : <strong>{{ exo.titre }}</strong></span>
      </div>
      <div class="right-part">
        <span [class]="'status-badge ' + (exo.etat === 'Fait' ? 'done' : 'todo')">
          {{ exo.etat === 'Fait' ? 'Terminé' : 'À faire' }}
        </span>
      </div>
    </div>
  </section>
</div>
