<a
  [routerLink]="['/exercice', exo.slug]"
  [queryParams]="coursId ? { cours: coursId } : {}"
  class="flex items-center justify-between px-5 py-4 bg-white border border-base-200 rounded-xl shadow-sm hover:border-primary hover:shadow-md transition-all duration-200 group"
>
  <!-- Gauche : numéro + titre -->
  <div class="flex items-center gap-4 min-w-0">
    <span class="text-sm font-semibold text-gray-400 shrink-0">
      #{{ index + 1 }}
    </span>
    <span class="font-medium text-gray-800 group-hover:text-primary transition-colors truncate">
      {{ exo.title }}
    </span>
  </div>

  <!-- Droite : badge statut -->
  <div class="ml-4 shrink-0">

    <span *ngIf="exo.status === 'completed'"
      class="inline-flex items-center gap-1.5 text-xs font-semibold px-3 py-1 rounded-full bg-green-100 text-green-800">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        style="fill:none;stroke:#166534;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round">
        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Complété
    </span>

    <span *ngIf="exo.status === 'in_progress'"
      class="inline-flex items-center gap-1.5 text-xs font-semibold px-3 py-1 rounded-full bg-amber-100 text-amber-800">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        style="fill:none;stroke:#92400e;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round">
        <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      En cours
    </span>

    <span *ngIf="exo.status === 'to_do' || !exo.status"
      class="inline-flex items-center gap-1.5 text-xs font-semibold px-3 py-1 rounded-full bg-gray-100 text-gray-500">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        style="fill:none;stroke:#6b7280;stroke-width:2.5;stroke-linecap:round">
        <circle cx="12" cy="12" r="9"/>
      </svg>
      À faire
    </span>

  </div>
</a>
