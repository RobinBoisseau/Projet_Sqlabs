<div class="canvas-wrapper">

  <!-- Palette d'outils -->
  <div class="canvas-toolbar">
    <div class="tool-drag-item" (mousedown)="startDrag($event, 'entity')">
      <app-toll-button icon="□" label="Entité"></app-toll-button>
    </div>
    <div class="tool-drag-item" (mousedown)="startDrag($event, 'association')">
      <app-toll-button icon="⬭" label="Association"></app-toll-button>
    </div>

    <div class="spacer"></div>

    <div class="toolbar-separator"></div>


    <button class="toolbar-btn" (click)="onUndo()" [disabled]="!caretaker.canUndo()" title="Annuler (Ctrl+Z)">
      ←
    </button>

    <button class="toolbar-btn" (click)="onRedo()" [disabled]="!caretaker.canRedo()" title="Rétablir (Ctrl+Y)">
      →
    </button>


  </div>

  <!-- Conteneur X6 -->
  <div #container class="x6-graph-container"></div>

  <!-- Overlay grisé (centré sur canvas-wrapper) -->
  <div class="picker-overlay" *ngIf="showPicker" (click)="closePicker()">
    <!-- Modale centrée -->
    <div class="picker-panel" (click)="$event.stopPropagation()">
      <div class="picker-header">
        <span>Choisir un champ pour l'entité : {{ pickerNode?.attr('label/text') }}</span>
        <button class="picker-close" (click)="closePicker()">×</button>
      </div>
      <app-choix-champ [champsDisponibles]="pickerAvailableNames" [champsSelectionnes]="pickerCurrentNames"
        placeholder="Rechercher un champ..." (selectionChanged)="onPickerSelectionChanged($event)">
      </app-choix-champ>
    </div>
  </div>

</div>
