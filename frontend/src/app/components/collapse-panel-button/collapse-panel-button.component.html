<button
  class="collapse-btn"
  (click)="toggle.emit()"
  [attr.aria-label]="collapsed ? 'Agrandir' : 'Réduire'">
  <svg
    xmlns="http://www.w3.org/2000/svg"
    width="14" height="14"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    [style.transform]="'rotate(' + rotation + 'deg)'"
    class="arrow-icon">
    <path d="M9 18l6-6-6-6"/>
  </svg>
</button>
