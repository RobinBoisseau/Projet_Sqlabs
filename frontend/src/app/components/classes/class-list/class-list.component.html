<div class="max-w-6xl mx-auto py-10 px-6">

  <div class="flex items-center justify-between mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Gestion des classes</h1>
    <a routerLink="/classes/create" class="btn btn-success gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        style="fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Créer une classe
    </a>
  </div>

  <div *ngIf="loading" class="text-gray-400">Chargement...</div>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <div *ngIf="!loading && !error && classes.length === 0"
    class="text-center py-20 text-gray-400">
    <p class="text-lg">Vous n'avez pas encore de classe.</p>
    <a routerLink="/classes/create" class="btn btn-success mt-4">Créer ma première classe</a>
  </div>

  <div *ngIf="!loading && !error && classes.length > 0"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

    <div *ngFor="let classe of classes"
      class="card bg-white border border-base-200 shadow-sm hover:shadow-md transition-shadow">

      <!-- Image -->
      <figure class="h-40 bg-gray-100 overflow-hidden">
        <img *ngIf="classe.image" [src]="classe.image" [alt]="classe.nom"
          class="w-full h-full object-cover"/>
        <div *ngIf="!classe.image"
          class="w-full h-full flex items-center justify-center text-gray-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
            style="fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
      </figure>

      <div class="card-body gap-2">
        <h2 class="card-title text-gray-800 text-lg">{{ classe.nom }}</h2>
        <p class="text-sm text-gray-500 line-clamp-2 flex-1">
          {{ classe.description || 'Aucune description.' }}
        </p>
        <div class="flex items-center justify-between mt-2">
          <span class="text-xs text-gray-400">{{ classe.member_count }} membre{{ classe.member_count > 1 ? 's' : '' }}</span>
          <a [routerLink]="['/classes', classe.id]" class="btn btn-primary btn-sm">Entrer</a>
        </div>
      </div>
    </div>

  </div>
</div>
