<div class="max-w-6xl mx-auto py-10 px-6" *ngIf="classe">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

    <!-- Colonne gauche : nom + image -->
    <div class="md:col-span-1">
      <div class="card bg-white border border-base-200 shadow-sm overflow-hidden">
        <figure class="h-52 bg-gray-100">
          <img *ngIf="classe.image" [src]="classe.image" [alt]="classe.nom"
            class="w-full h-full object-cover"/>
          <div *ngIf="!classe.image"
            class="w-full h-full flex items-center justify-center text-gray-300">
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24"
              style="fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
        </figure>
        <div class="card-body">
          <h2 class="card-title text-gray-800">{{ classe.nom }}</h2>
          <p class="text-sm text-gray-500">{{ classe.description || 'Aucune description.' }}</p>
        </div>
      </div>
    </div>

    <!-- Colonne droite : infos -->
    <div class="md:col-span-2 flex flex-col gap-5">

      <!-- Membres -->
      <div class="stat bg-white border border-base-200 rounded-xl shadow-sm">
        <div class="stat-figure text-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
            style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="stat-title">Membres</div>
        <div class="stat-value text-primary">{{ classe.member_count }}</div>
      </div>

      <!-- Visibilité -->
      <div class="card bg-white border border-base-200 shadow-sm">
        <div class="card-body py-4">
          <div class="flex items-center justify-between">
            <span class="font-semibold text-gray-700">Visibilité</span>
            <span class="badge"
              [class.badge-success]="classe.visibility === 'public'"
              [class.badge-ghost]="classe.visibility === 'private'">
              {{ classe.visibility === 'public' ? 'Publique' : 'Privée' }}
            </span>
          </div>
        </div>
      </div>

      <!-- Code d'accès (visible uniquement pour le staff) -->
      <div *ngIf="classe.join_code" class="card bg-white border border-base-200 shadow-sm">
        <div class="card-body py-4">
          <div class="flex items-center justify-between">
            <span class="font-semibold text-gray-700">Code d'accès</span>
            <span class="font-mono text-xl font-bold tracking-widest text-primary bg-primary/10 px-4 py-1 rounded-lg">
              {{ classe.join_code }}
            </span>
          </div>
          <p class="text-xs text-gray-400 mt-1">Partagez ce code avec vos étudiants pour qu'ils rejoignent la classe.</p>
        </div>
      </div>

    </div>
  </div>
</div>
