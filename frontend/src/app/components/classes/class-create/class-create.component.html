<div class="max-w-lg mx-auto py-10 px-6">

  <div class="mb-8">
    <a routerLink="/classes" class="text-sm text-primary hover:underline">← Mes classes</a>
    <h1 class="text-2xl font-bold text-gray-900 mt-1">Créer une classe</h1>
  </div>

  <div class="card bg-white border border-base-200 shadow-sm">
    <div class="card-body gap-5">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

        <!-- Nom -->
        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-semibold">Nom de la classe</span></label>
          <input type="text" formControlName="nom" placeholder="Ex : Terminale BTS SIO"
            class="input input-bordered w-full" [class.input-error]="form.get('nom')?.invalid && form.get('nom')?.touched"/>
          <label class="label pt-1" *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched">
            <span class="label-text-alt text-error">Nom requis</span>
          </label>
        </div>

        <!-- Description -->
        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-semibold">Description</span></label>
          <textarea formControlName="description" placeholder="Décrivez votre classe…"
            class="textarea textarea-bordered w-full" rows="3"></textarea>
        </div>

        <!-- Image -->
        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-semibold">Image de la classe</span></label>
          <input type="file" accept="image/*" (change)="onImageChange($event)"
            class="file-input file-input-bordered w-full"/>
          <div *ngIf="imagePreview" class="mt-3 rounded-xl overflow-hidden h-36">
            <img [src]="imagePreview" alt="Aperçu" class="w-full h-full object-cover"/>
          </div>
        </div>

        <!-- Visibilité -->
        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-semibold">Visibilité</span></label>
          <select formControlName="visibility" class="select select-bordered w-full">
            <option value="public">Publique</option>
            <option value="private">Privée</option>
          </select>
        </div>

        <!-- Code d'accès -->
        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-semibold">Code d'accès</span></label>
          <div class="flex gap-2">
            <input type="text" formControlName="join_code" placeholder="Ex : AB3X9Z"
              class="input input-bordered flex-1 font-mono tracking-widest uppercase"
              [class.input-error]="form.get('join_code')?.invalid && form.get('join_code')?.touched"
              maxlength="8"/>
            <button type="button" class="btn btn-outline btn-primary" (click)="generateCode()">
              Générer
            </button>
          </div>
          <label class="label pt-1" *ngIf="form.get('join_code')?.invalid && form.get('join_code')?.touched">
            <span class="label-text-alt text-error">Code requis (4 à 8 caractères)</span>
          </label>
        </div>

        <!-- Erreur -->
        <div *ngIf="error" class="alert alert-error text-sm">{{ error }}</div>

        <!-- Actions -->
        <div class="flex justify-end gap-3 mt-2">
          <a routerLink="/classes" class="btn btn-ghost">Annuler</a>
          <button type="submit" class="btn btn-success" [disabled]="form.invalid || saving">
            <span *ngIf="saving" class="loading loading-spinner loading-xs"></span>
            {{ saving ? 'Création…' : 'Créer la classe' }}
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
