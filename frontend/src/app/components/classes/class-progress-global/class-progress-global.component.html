<div class="max-w-4xl mx-auto py-10 px-6">

  <h1 class="text-2xl font-bold text-gray-900 mb-8">Progression globale</h1>

  <div *ngIf="isLoading" class="text-gray-400">Chargement...</div>

  <ng-container *ngIf="!isLoading">

    <div *ngIf="cours.length === 0" class="text-gray-400">Aucun cours assigné à cette classe.</div>

    <div *ngFor="let c of cours" class="mb-8">

      <!-- Titre du cours -->
      <h2 class="text-base font-semibold text-gray-700 uppercase tracking-wide mb-3">{{ c.title }}</h2>

      <div class="bg-white border border-base-200 rounded-xl shadow-sm overflow-hidden">
        <table class="table w-full">
          <thead>
            <tr class="text-xs uppercase tracking-wide text-gray-500 bg-gray-50">
              <th class="w-1/3">Exercice</th>
              <th>Progression</th>
              <th class="text-center w-24">Terminé</th>
              <th class="text-center w-24">En cours</th>
              <th class="text-center w-24">Non commencé</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let e of c.exercices" class="border-t border-base-100">
              <td class="font-medium text-gray-800 text-sm">{{ e.title }}</td>
              <td class="pr-4">
                <!-- Barre de progression tricolore -->
                <div class="flex h-3 rounded-full overflow-hidden bg-gray-100 min-w-32">
                  <div
                    class="bg-green-500 transition-all"
                    [style.width.%]="pct(e.stats.completed, e.stats)"
                    title="Terminé : {{ e.stats.completed }}">
                  </div>
                  <div
                    class="bg-orange-400 transition-all"
                    [style.width.%]="pct(e.stats.in_progress, e.stats)"
                    title="En cours : {{ e.stats.in_progress }}">
                  </div>
                </div>
              </td>
              <td class="text-center">
                <span class="text-sm font-semibold text-green-600">{{ e.stats.completed }}</span>
              </td>
              <td class="text-center">
                <span class="text-sm font-semibold text-orange-500">{{ e.stats.in_progress }}</span>
              </td>
              <td class="text-center">
                <span class="text-sm text-gray-400">{{ e.stats.not_started }}</span>
              </td>
            </tr>
            <tr *ngIf="c.exercices.length === 0">
              <td colspan="5" class="text-center text-gray-400 py-6 text-sm">Aucun exercice dans ce cours.</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

  </ng-container>
</div>
