<div class="dict-container"> <!-- On réutilise le conteneur stylé -->
  <div cdkDropList 
       id="depList" 
       (cdkDropListDropped)="onDrop($event)">
       
    <table class="dict-table">
      <thead>
        <tr>
          <th>Entité Source</th>
          <th>Champ Source </th>
          <th>Cible</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let dep of dependances; let i = index">
          <td><input type="text" [(ngModel)]="dep.Entite" placeholder="Entité..."></td>
          <td>
            <input type="text" 
                   [(ngModel)]="dep.ChampSource" 
                   placeholder="Déposer l'étiquette ici..."
                   class="drop-target-input">
          </td>
          <td><input type="text" [(ngModel)]="dep.Cible" placeholder="Cible..."></td>
        </tr>
      </tbody>
    </table>
  </div>
  <button class="add-row-btn" (click)="ajouterDependance()">
    <span>+</span> Ajouter une dépendance
  </button>
</div>
